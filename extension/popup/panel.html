<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ModCrew</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <header>
      <h1>ModCrew</h1>
      <div class="header-right">
        <label class="site-toggle" id="siteToggleWrap" title="Disable all mods on this site">
          <span class="site-toggle-label" id="siteToggleHost">Site</span>
          <input type="checkbox" id="siteToggle" checked />
          <span class="site-toggle-slider"></span>
        </label>
        <div id="status" class="status disconnected">●</div>
      </div>
    </header>

    <section class="setup">
      <div class="setup-label">Add to Claude Code — copy this command:</div>
      <div class="cmd-box">
        <code id="mcp-cmd">Loading…</code>
        <button id="copy-btn">Copy</button>
      </div>
      <div class="setup-hint" id="setup-hint">
        Paste in your terminal where Claude Code runs.
      </div>
    </section>

    <section id="update-banner" class="update-banner" style="display:none"></section>

    <section class="perm-row">
      <label class="perm-toggle">
        <input type="checkbox" id="writesToggle" checked />
        <span class="perm-toggle-slider"></span>
        <span class="perm-toggle-text">Allow AI to change pages</span>
      </label>
      <button class="link-btn perm-aux" id="openActivityBtn">Activity</button>
    </section>

    <section class="library">
      <div class="lib-header">
        <h2>Library</h2>
        <div class="lib-tabs">
          <button class="lib-tab active" data-filter="current">This site</button>
          <button class="lib-tab" data-filter="all">All</button>
        </div>
      </div>
      <ul id="mods-list" class="mods-list"></ul>
    </section>

    <footer>
      <button id="regen-btn" class="link-btn">Regenerate token</button>
      <span class="sep">·</span>
      <a href="https://modcrew.dev/install" target="_blank">Help</a>
    </footer>

    <!-- Source viewer modal -->
    <div id="source-modal" class="modal" style="display:none">
      <div class="modal-body">
        <div class="modal-header">
          <span id="modal-title">Source</span>
          <button id="modal-close" class="link-btn">×</button>
        </div>
        <pre id="modal-content"></pre>
      </div>
    </div>

    <!-- Activity (MCP audit log) modal -->
    <div id="activity-modal" class="modal" style="display:none">
      <div class="modal-body activity-body">
        <div class="modal-header">
          <span>Recent MCP activity</span>
          <div>
            <button id="activity-clear" class="link-btn">Clear</button>
            <button id="activity-close" class="link-btn" style="margin-left:8px">×</button>
          </div>
        </div>
        <ul id="activity-list" class="activity-list"></ul>
      </div>
    </div>

    <script type="module" src="panel.js"></script>
  </body>
</html>
