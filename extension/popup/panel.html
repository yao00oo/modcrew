<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ModCrew</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <header>
      <h1>ModCrew</h1>
      <div id="status" class="status disconnected">●</div>
    </header>

    <section class="setup">
      <div class="setup-label">Add to Claude Code — copy this command:</div>
      <div class="cmd-box">
        <code id="mcp-cmd">Loading…</code>
        <button id="copy-btn">Copy</button>
      </div>
      <div class="setup-hint" id="setup-hint">
        Paste in your terminal where Claude Code runs.
      </div>
    </section>

    <section id="update-banner" class="update-banner" style="display:none"></section>

    <section class="current-domain">
      <h2 id="current-domain-name">—</h2>
      <ul id="mods-list" class="mods-list"></ul>
    </section>

    <footer>
      <button id="regen-btn" class="link-btn">Regenerate token</button>
      <span class="sep">·</span>
      <a href="https://modcrew.dev/install" target="_blank">Help</a>
    </footer>

    <script type="module" src="panel.js"></script>
  </body>
</html>
